version: "3.9"

services:
  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: lead_gen_api
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the postgres service
      - DATABASE_URL=postgresql+asyncpg://leads:leads@db:5432/leads_db
    volumes:
      - ./exports:/app/exports      # persist exported files
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL (production DB) ────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: lead_gen_db
    environment:
      POSTGRES_USER: leads
      POSTGRES_PASSWORD: leads
      POSTGRES_DB: leads_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leads -d leads_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
