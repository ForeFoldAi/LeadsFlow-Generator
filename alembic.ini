[alembic]
# Path to migration scripts
script_location = alembic

# Prepend sys.path so app package is importable during migrations
prepend_sys_path = .

# Template for new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration file headers
timezone = UTC

# Version path separator (os = os.pathsep, : = colon, ; = semicolon, space = space)
version_path_separator = os

# SQLAlchemy URL — overridden at runtime by alembic/env.py reading settings
sqlalchemy.url = sqlite+aiosqlite:///./leads.db


# ── Logging ───────────────────────────────────────────────────────────────────

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
